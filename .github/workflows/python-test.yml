name: Python Application Test

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  test-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy

    - name: Test nadi_generator module
      run: |
        echo "Testing nadi_generator.py..."
        python -c "from nadi_generator import VirtualSensor; print('✓ nadi_generator imports successfully')"
        python -c "from nadi_generator import VirtualSensor; import time; sensor = VirtualSensor(sampling_rate=1000, batch_size=50); sensor.start(); time.sleep(0.2); batch = sensor.get_latest_batch(timeout=1.0); sensor.stop(); assert batch is not None; assert len(batch) == 50; print(f'✓ Generated batch shape: {batch.shape}'); print('✓ nadi_generator test passed')"

    - name: Test nadi_dsp module
      run: |
        echo "Testing nadi_dsp.py..."
        python -c "from nadi_dsp import NadiDSP; print('✓ nadi_dsp imports successfully')"
        python -c "from nadi_dsp import NadiDSP; import numpy as np; dsp = NadiDSP(sampling_rate=1000, highpass_cutoff=0.1); test_batch = np.random.randn(50) * 0.1 + 0.5; results = dsp.process_batch(test_batch); assert 'raw_filtered' in results; assert 'velocity' in results; assert 'displacement' in results; assert len(results['raw_filtered']) == 50; assert len(results['velocity']) == 50; assert len(results['displacement']) == 50; print(f'✓ Raw filtered shape: {results[\"raw_filtered\"].shape}'); print(f'✓ Velocity shape: {results[\"velocity\"].shape}'); print(f'✓ Displacement shape: {results[\"displacement\"].shape}'); print('✓ nadi_dsp test passed')"

    - name: Check code quality (syntax)
      run: |
        echo "Checking Python syntax..."
        python -m py_compile nadi_generator.py
        echo "✓ nadi_generator.py syntax OK"
        python -m py_compile nadi_dsp.py
        echo "✓ nadi_dsp.py syntax OK"
        python -m py_compile nadi_main.py
        echo "✓ nadi_main.py syntax OK"

  build-exe-windows:
    runs-on: windows-latest
    needs: test-linux

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy PyQt6 pyqtgraph pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        echo "Building Windows EXE..."
        pyinstaller --clean nadi.spec

    - name: Upload EXE artifact
      uses: actions/upload-artifact@v4
      with:
        name: AyurvedicNadiPariksha-Windows
        path: dist/AyurvedicNadiPariksha/
        retention-days: 30
